<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #FDF9F7; /* สีพื้นหลังให้อ่อนสุดๆ */
            font-family: 'Sarabun', sans-serif;
            overflow: hidden; /* ซ่อน Scrollbar ของ Body */
        }
        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        /* User Message (ขวา) */
        .message-user {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .bubble-user {
            background-color: #8C5E51; /* สีน้ำตาลเข้ม */
            color: white;
            padding: 10px 15px;
            border-radius: 15px 15px 0 15px;
            max-width: 75%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* Bot Message (ซ้าย) */
        .message-bot {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
        }
        .bubble-bot {
            background-color: #ffffff;
            color: #333;
            padding: 10px 15px;
            border-radius: 15px 15px 15px 0;
            max-width: 75%;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        /* Input Area */
        .input-area {
            background-color: white;
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .btn-send {
            background-color: #8C5E51;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .btn-send:hover {
            background-color: #6F4A40;
            transform: scale(1.05);
        }
        .typing-indicator {
            font-size: 0.8em;
            color: #888;
            margin-left: 10px;
            display: none; /* ซ่อนไว้ก่อน */
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-box" id="chat-box">
        <div class="message-bot">
            <div class="bubble-bot">
                <i class="fa-solid fa-robot text-warning me-2"></i>
                สวัสดีครับ! น้องแชทบอท Admission ยินดีให้บริการ ถามเรื่องเกณฑ์การรับสมัครได้เลยครับ
            </div>
        </div>
    </div>

    <div class="typing-indicator" id="loading">
        <i class="fa-solid fa-circle-notch fa-spin"></i> กำลังประมวลผลคำตอบ...
    </div>

    <div class="input-area">
        <input type="text" id="user-input" class="form-control rounded-pill bg-light border-0 px-4" placeholder="พิมพ์คำถามที่นี่..." onkeypress="handleEnter(event)">
        <button class="btn-send shadow-sm" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        
        if (sender === 'user') {
            msgDiv.className = 'message-user';
            msgDiv.innerHTML = `<div class="bubble-user">${text}</div>`;
        } else {
            msgDiv.className = 'message-bot';
            msgDiv.innerHTML = `<div class="bubble-bot"><i class="fa-solid fa-robot text-warning me-2"></i> ${text}</div>`;
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // เลื่อนลงล่างสุด
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value.trim();
        if (!message) return;

        // 1. แสดงข้อความผู้ใช้ทันที
        appendMessage(message, 'user');
        inputField.value = ''; // เคลียร์ช่อง
        document.getElementById('loading').style.display = 'block'; // โชว์ loading

        try {
            // 2. ส่งข้อมูลไปหา Server (AJAX Request)
            const response = await fetch("{% url 'chat_api' %}", {  // เรียก URL ชื่อ chat_api
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}' // สำคัญมาก! ต้องมี Token
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            // 3. แสดงคำตอบจากบอท
            document.getElementById('loading').style.display = 'none';
            if (data.response) {
                appendMessage(data.response, 'bot');
            } else {
                appendMessage("ขออภัย ระบบขัดข้อง (No Response)", 'bot');
            }

        } catch (error) {
            document.getElementById('loading').style.display = 'none';
            appendMessage("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์", 'bot');
            console.error(error);
        }
    }
</script>

</body>
</html>
