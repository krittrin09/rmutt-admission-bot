<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Admission System{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* ==== ธีมสีน้ำตาล (Global Theme) ==== */
    :root {
        --brown-primary: #8C5E51;
        --brown-light: #A3857B;
        --brown-dark: #6F4A40;
        --brown-header: #8C5E51;  /* สีเดียวกับหัว Chatbot */
        --light-brown-bg: #F5EFEC;
        --light-brown-body: #FDF9F7;
        --white-card: #FFFFFF;
    }

    body {
        background-color: var(--light-brown-bg);
        font-family: 'Sarabun', sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    main {
        flex: 1;
    }

    .navbar-brand {
        font-weight: 600;
        letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: var(--brown-header);">
  <div class="container">
    <a class="navbar-brand" href="{% url 'home' %}">
        <i class="fa-solid fa-university me-2"></i>RMUTT Admission
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item">
            </li>
        </ul>
    </div>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="text-center py-3 mt-4" style="color: var(--brown-light); font-size: 0.85em;">
    <div class="container">
        <small>&copy; 2025 Faculty of Science and Technology, RMUTT</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
