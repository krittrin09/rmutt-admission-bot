{% extends "base.html" %}

{% block title %}เข้าสู่ระบบผู้ดูแล{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-shield fa-3x text-primary"></i>
            <h4 class="mt-2 fw-bold">Admin Login</h4>
            <p class="text-muted small">สำหรับเจ้าหน้าที่แก้ไขข้อมูลเท่านั้น</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill">
                เข้าสู่ระบบ <i class="fa-solid fa-right-to-bracket"></i>
            </button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none text-secondary small">กลับหน้าหลัก</a>
        </div>
    </div>
</div>
{% endblock %}
